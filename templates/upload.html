<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upload Story - Memory of the Village</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  @keyframes float { 0%,100%{ transform: translateY(0);} 50%{ transform: translateY(-6px);} }
  .animate-float { animation: float 3s ease-in-out infinite; }
  .glass {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.1);
  }
  .hover-glow:hover {
    box-shadow: 0 0 20px rgba(255,255,255,0.2);
    transform: translateY(-3px);
    transition: all 0.3s ease-in-out;
  }
</style>
</head>
<body class="bg-gray-900 text-white min-h-screen font-sans">

<!-- Navbar -->
<nav class="glass sticky top-0 z-50 shadow-md py-3">
  <div class="max-w-7xl mx-auto flex justify-between items-center px-6">
    <span class="text-2xl font-bold">🌿 Memory of the Village</span>
    <div class="space-x-4 flex items-center">
      <a href="/" class="hover:text-purple-400 transition">Home</a>
      <a href="/upload" class="text-purple-400 px-2 py-1 rounded bg-white/10">Upload</a>
      <a href="/search" class="hover:text-purple-400 transition">Search</a>
      {% if g.user %}
        <a href="{{ url_for('auth.profile') }}" class="hover:text-purple-400 transition">👤 {{ g.user.username }}</a>
        <form method="POST" action="{{ url_for('auth.logout') }}" class="inline">
          <button type="submit" class="text-red-400 hover:text-red-300 transition">Logout</button>
        </form>
      {% else %}
        <a href="{{ url_for('auth.login') }}" class="hover:text-purple-400 transition">Login</a>
      {% endif %}
   <!--   <a href="/settings" class="hover:text-purple-400 transition">Settings</a>-->
      <a href="/admin" class="hover:text-purple-400 transition">Admin</a>
    </div>
  </div>
</nav>

<!-- Upload Form -->
<div class="max-w-3xl mx-auto px-6 py-12">
  <div class="glass rounded-2xl p-8 shadow-lg hover-glow">
    <h2 class="text-4xl font-bold mb-6">📝 Share Your Story</h2>

    <div id="messageDiv" class="hidden mb-4 p-4 rounded-lg"></div>

    <form id="uploadForm" enctype="multipart/form-data">
      <div class="mb-6">
        <label class="block text-gray-400 font-semibold mb-2">Speaker Name *</label>
        <input type="text" name="speaker_name" id="speaker_name" required
               class="w-full px-4 py-3 bg-white/5 border border-white/20 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500 text-white placeholder-gray-500"
               placeholder="Enter your name">
      </div>

      <div class="mb-6">
        <label class="block text-gray-400 font-semibold mb-2">District/Village</label>
        <input type="text" name="district" id="district"
               class="w-full px-4 py-3 bg-white/5 border border-white/20 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500 text-white placeholder-gray-500"
               placeholder="Enter your district or village">
      </div>

      <div class="mb-6 flex space-x-4">
        <button type="button" id="textBtn" onclick="showTextInput()"
                class="flex-1 px-6 py-3 bg-purple-700 text-white rounded-lg font-semibold hover:bg-purple-600 transition-all shadow-lg">
            📝 Write Text
        </button>
        <button type="button" id="audioBtn" onclick="showAudioInput()"
                class="flex-1 px-6 py-3 bg-white/10 text-gray-300 rounded-lg font-semibold hover:bg-white/20 transition-all border border-white/20">
            🎤 Upload Audio
        </button>
      </div>

      <div id="textInput" class="mb-6">
        <label class="block text-gray-400 font-semibold mb-2">Your Story</label>
        <textarea name="story_text" id="story_text" rows="8"
                  class="w-full px-4 py-3 bg-white/5 border border-white/20 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500 text-white placeholder-gray-500"
                  placeholder="Write your story here..."></textarea>
      </div>

      <div id="audioInput" class="mb-6 hidden">
        <label class="block text-gray-400 font-semibold mb-2">Audio File</label>
        <input type="file" name="audio_file" id="audio_file" accept=".mp3,.wav,.ogg,.m4a,.flac"
               class="w-full px-4 py-3 bg-white/5 border border-white/20 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500 text-white file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:bg-purple-700 file:text-white file:cursor-pointer hover:file:brightness-110">
        <p class="text-sm text-gray-400 mt-2">Accepted: MP3, WAV, OGG, M4A, FLAC (max 50MB)</p>
      </div>

      <div class="mb-6">
        <label class="block text-gray-400 font-semibold mb-2">Cover Image (optional)</label>
        <input type="file" name="cover_image" id="cover_image" accept="image/*"
               class="w-full px-4 py-3 bg-white/5 border border-white/20 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500 text-white file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:bg-purple-700 file:text-white file:cursor-pointer hover:file:brightness-110">
        <p class="text-sm text-gray-400 mt-2">Accepted: JPG, PNG, GIF, WEBP</p>
      </div>

      <div class="mb-6 flex items-center space-x-4">
        <input type="checkbox" id="generate_tts" name="generate_tts" value="1" class="w-4 h-4">
        <label for="generate_tts" class="text-gray-300">Generate audio from text (Text → Voice)</label>
      </div>

      <button type="submit" id="submitBtn"
              class="w-full bg-purple-700 text-white font-bold py-4 rounded-lg hover:bg-purple-600 transition-all shadow-lg text-lg">
        🚀 Upload Story
      </button>
    </form>

    <div id="loading" class="hidden mt-6 text-center">
      <div class="inline-block animate-spin rounded-full h-12 w-12 border-b-2 border-purple-500"></div>
      <p class="text-gray-400 mt-4 text-lg">Processing your story...</p>
    </div>
  </div>
</div>

<script>
let currentMode = 'text';
function showTextInput() {
  currentMode = 'text';
  document.getElementById('textInput').classList.remove('hidden');
  document.getElementById('audioInput').classList.add('hidden');
  document.getElementById('textBtn').className = 'flex-1 px-6 py-3 bg-purple-700 text-white rounded-lg font-semibold hover:bg-purple-600 transition-all shadow-lg';
  document.getElementById('audioBtn').className = 'flex-1 px-6 py-3 bg-white/10 text-gray-300 rounded-lg font-semibold hover:bg-white/20 transition-all border border-white/20';
}
function showAudioInput() {
  currentMode = 'audio';
  document.getElementById('audioInput').classList.remove('hidden');
  document.getElementById('textInput').classList.add('hidden');
  document.getElementById('audioBtn').className = 'flex-1 px-6 py-3 bg-purple-700 text-white rounded-lg font-semibold hover:bg-purple-600 transition-all shadow-lg';
  document.getElementById('textBtn').className = 'flex-1 px-6 py-3 bg-white/10 text-gray-300 rounded-lg font-semibold hover:bg-white/20 transition-all border border-white/20';
}

document.getElementById('uploadForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const formData = new FormData(e.target);
  const messageDiv = document.getElementById('messageDiv');
  const loading = document.getElementById('loading');
  const submitBtn = document.getElementById('submitBtn');

  messageDiv.classList.add('hidden');
  loading.classList.remove('hidden');
  submitBtn.disabled = true;

  try {
    const response = await fetch('/api/upload', { method: 'POST', body: formData });
    const data = await response.json();

    if (response.ok) {
      messageDiv.className = 'mb-4 p-4 rounded-lg bg-green-500/20 text-green-300 border border-green-500/50';
      messageDiv.innerHTML = `<strong>✓ Success!</strong> Story uploaded with emotion: <span class="font-bold">${data.emotion_tag}</span>`;
      messageDiv.classList.remove('hidden');
      e.target.reset();
    } else {
      messageDiv.className = 'mb-4 p-4 rounded-lg bg-red-500/20 text-red-300 border border-red-500/50';
      messageDiv.innerHTML = `<strong>⚠ Error:</strong> ${data.error}`;
      messageDiv.classList.remove('hidden');
    }
  } catch (error) {
    messageDiv.className = 'mb-4 p-4 rounded-lg bg-red-500/20 text-red-300 border border-red-500/50';
    messageDiv.innerHTML = `<strong>⚠ Error:</strong> ${error.message}`;
    messageDiv.classList.remove('hidden');
  } finally {
    loading.classList.add('hidden');
    submitBtn.disabled = false;
  }
});
</script>

</body>
</html>
