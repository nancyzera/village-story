<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Story - Memory of the Village</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen">
    <nav class="bg-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <h1 class="text-2xl font-bold text-indigo-600">Memory of the Village</h1>
                </div>
                <div class="flex items-center space-x-4">
                    <a href="/" class="text-gray-700 hover:text-indigo-600 px-3 py-2 rounded-md">Home</a>
                    <a href="/upload" class="text-gray-700 hover:text-indigo-600 px-3 py-2 rounded-md">Upload Story</a>
                    <a href="/search" class="text-gray-700 hover:text-indigo-600 px-3 py-2 rounded-md">Search</a>
                    <a href="/admin" class="text-gray-700 hover:text-indigo-600 px-3 py-2 rounded-md">Admin</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
        <div class="bg-white rounded-lg shadow-lg p-8">
            <h2 class="text-3xl font-bold text-gray-900 mb-6">Share Your Story</h2>
            
            <div id="messageDiv" class="hidden mb-4 p-4 rounded"></div>

            <form id="uploadForm" enctype="multipart/form-data">
                <div class="mb-6">
                    <label class="block text-gray-700 font-semibold mb-2">Speaker Name *</label>
                    <input type="text" name="speaker_name" id="speaker_name" required
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500"
                           placeholder="Enter your name">
                </div>

                <div class="mb-6">
                    <label class="block text-gray-700 font-semibold mb-2">District/Village</label>
                    <input type="text" name="district" id="district"
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500"
                           placeholder="Enter your district or village">
                </div>

                <div class="mb-6">
                    <label class="block text-gray-700 font-semibold mb-2">Upload Method</label>
                    <div class="flex space-x-4 mb-4">
                        <button type="button" id="textBtn" onclick="showTextInput()"
                                class="px-6 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition">
                            Write Text
                        </button>
                        <button type="button" id="audioBtn" onclick="showAudioInput()"
                                class="px-6 py-2 bg-gray-300 text-gray-700 rounded-lg hover:bg-gray-400 transition">
                            Upload Audio
                        </button>
                    </div>
                </div>

                <div id="textInput" class="mb-6">
                    <label class="block text-gray-700 font-semibold mb-2">Your Story</label>
                    <textarea name="story_text" id="story_text" rows="8"
                              class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500"
                              placeholder="Write your story here..."></textarea>
                </div>

                <div id="audioInput" class="mb-6 hidden">
                    <label class="block text-gray-700 font-semibold mb-2">Audio File</label>
                    <input type="file" name="audio_file" id="audio_file" accept=".mp3,.wav,.ogg,.m4a,.flac"
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
                    <p class="text-sm text-gray-500 mt-2">Accepted formats: MP3, WAV, OGG, M4A, FLAC (max 50MB)</p>
                </div>

                <button type="submit" id="submitBtn"
                        class="w-full bg-indigo-600 text-white font-semibold py-3 rounded-lg hover:bg-indigo-700 transition">
                    Upload Story
                </button>
            </form>

            <div id="loading" class="hidden mt-4 text-center">
                <div class="inline-block animate-spin rounded-full h-8 w-8 border-b-2 border-indigo-600"></div>
                <p class="text-gray-600 mt-2">Processing your story...</p>
            </div>
        </div>
    </div>

    <script>
        let currentMode = 'text';

        function showTextInput() {
            currentMode = 'text';
            document.getElementById('textInput').classList.remove('hidden');
            document.getElementById('audioInput').classList.add('hidden');
            document.getElementById('textBtn').classList.add('bg-indigo-600', 'text-white');
            document.getElementById('textBtn').classList.remove('bg-gray-300', 'text-gray-700');
            document.getElementById('audioBtn').classList.remove('bg-indigo-600', 'text-white');
            document.getElementById('audioBtn').classList.add('bg-gray-300', 'text-gray-700');
        }

        function showAudioInput() {
            currentMode = 'audio';
            document.getElementById('audioInput').classList.remove('hidden');
            document.getElementById('textInput').classList.add('hidden');
            document.getElementById('audioBtn').classList.add('bg-indigo-600', 'text-white');
            document.getElementById('audioBtn').classList.remove('bg-gray-300', 'text-gray-700');
            document.getElementById('textBtn').classList.remove('bg-indigo-600', 'text-white');
            document.getElementById('textBtn').classList.add('bg-gray-300', 'text-gray-700');
        }

        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = new FormData(e.target);
            const messageDiv = document.getElementById('messageDiv');
            const loading = document.getElementById('loading');
            const submitBtn = document.getElementById('submitBtn');
            
            messageDiv.classList.add('hidden');
            loading.classList.remove('hidden');
            submitBtn.disabled = true;

            try {
                const response = await fetch('/api/upload', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (response.ok) {
                    messageDiv.className = 'mb-4 p-4 rounded bg-green-100 text-green-800';
                    messageDiv.textContent = `Success! Story uploaded with emotion: ${data.emotion_tag}`;
                    messageDiv.classList.remove('hidden');
                    e.target.reset();
                } else {
                    messageDiv.className = 'mb-4 p-4 rounded bg-red-100 text-red-800';
                    messageDiv.textContent = `Error: ${data.error}`;
                    messageDiv.classList.remove('hidden');
                }
            } catch (error) {
                messageDiv.className = 'mb-4 p-4 rounded bg-red-100 text-red-800';
                messageDiv.textContent = `Error: ${error.message}`;
                messageDiv.classList.remove('hidden');
            } finally {
                loading.classList.add('hidden');
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
