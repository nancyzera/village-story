<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Memory of the Village</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }
    </style>
</head>
<body class="bg-gray-900 text-white min-h-screen font-sans">
    <div class="min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
        <div class="w-full max-w-md">
            <!-- Header -->
            <div class="text-center mb-8">
                <h1 class="text-4xl font-bold text-white mb-2">Memory of the Village</h1>
                <p class="text-gray-300">Preserving Stories, Honoring Heritage</p>
            </div>

            <!-- Login Card -->
            <div class="glass rounded-lg shadow-xl p-8">
                <h2 class="text-2xl font-bold text-white mb-6">Welcome Back</h2>

                {% if error %}
                <div class="mb-4 p-4 bg-red-500/20 border border-red-500/50 text-red-300 rounded">
                    {{ error }}
                </div>
                {% endif %}

                <form method="POST" class="space-y-6">
                    <!-- Username -->
                    <div>
                        <label for="username" class="block text-sm font-medium text-gray-300 mb-2">
                            Username
                        </label>
                        <input 
                            type="text" 
                            id="username" 
                            name="username" 
                            required
                            class="w-full px-4 py-2 bg-white/5 border border-white/20 rounded-lg focus:ring-2 focus:ring-purple-500 focus:outline-none text-white placeholder-gray-500"
                            placeholder="Enter your username"
                        >
                    </div>

                    <!-- Password -->
                    <div>
                        <label for="password" class="block text-sm font-medium text-gray-300 mb-2">
                            Password
                        </label>
                        <input 
                            type="password" 
                            id="password" 
                            name="password" 
                            required
                            class="w-full px-4 py-2 bg-white/5 border border-white/20 rounded-lg focus:ring-2 focus:ring-purple-500 focus:outline-none text-white placeholder-gray-500"
                            placeholder="Enter your password"
                        >
                    </div>

                    <!-- Login Button -->
                    <button 
                        type="submit"
                        class="w-full bg-purple-600 text-white py-2 rounded-lg font-semibold hover:bg-purple-700 transition duration-200"
                    >
                        Login
                    </button>
                </form>

                <!-- Signup Link -->
                <div class="mt-6 text-center">
                    <p class="text-gray-300">
                        Don't have an account?
                        <a href="{{ url_for('auth.signup') }}" class="text-purple-400 font-semibold hover:text-purple-300">
                            Sign up here
                        </a>
                    </p>
                </div>
            </div>

            <!-- Back to Home -->
            <div class="text-center mt-6">
                <a href="{{ url_for('index') }}" class="text-white hover:text-purple-200 text-sm">
                    Back to Home
                </a>
            </div>
        </div>
    </div>
</body>
</html>
